<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAN Monitor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/chart.umd.min.js"></script>
    <script src="vendor/chartjs-plugin-annotation.min.js"></script>
  </head>
  <body>
    <header style="margin-top:28px">
      <h1>Трафік на WAN-інтерфейсах (середнє за 1 хв)</h1>
      <div class="controls">
        <span id="speed-status">—</span>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="speed"></canvas></div>
    </div>

    <header style="margin-top:28px">
      <h1>Стан dual-WAN scheduler</h1>
      <div class="controls">
        <span id="router-status">—</span>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="flaps"></canvas></div>
      <div class="box">
        <div class="netwatch-cards" id="controller-cards"></div>
        <table class="events" id="events-table">
          <thead>
            <tr><th>Час</th><th>Primary WAN</th><th>Причина</th></tr>
          </thead>
          <tbody id="events-body"></tbody>
        </table>
      </div>
    </div>
    <div class="box raw-log" id="raw-log-box">
      <div class="raw-log-toolbar">
        <span>Сирий лог MikroTik (останні <span id="raw-log-count">0</span> рядків)</span>
        <button id="refresh-router">Оновити лог</button>
        <button id="toggle-raw-log">Показати лог MikroTik</button>
        <input type="text" id="raw-log-filter" placeholder="Фільтр по тексту…" autocomplete="off" />
      </div>
      <pre class="raw-log-view" id="raw-log-view" hidden></pre>
    </div>

    <header style="margin-top:28px">
      <h1>Агент</h1>
    </header>
    <div class="box agent-panel">
      <div class="agent-messages" id="agent-messages"></div>
      <form class="agent-input" id="agent-form">
        <input type="text" id="agent-text" placeholder="Напр.: прочитай стан WAN або покажи журнал LMT" autocomplete="off" />
        <button type="submit" id="agent-send">Надіслати</button>
      </form>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
