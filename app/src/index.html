<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAN Monitor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/chart.umd.min.js"></script>
    <script src="vendor/chartjs-plugin-annotation.min.js"></script>
  </head>
  <body>
    <header>
      <h1>WAN якість: LMT vs BITE</h1>
      <div class="controls">
        <label for="range-from">Період:</label>
        <span id="custom-range" class="custom-range">
          <input type="datetime-local" id="range-from" />
          —
          <input type="datetime-local" id="range-to" />
          <button id="apply-range">Застосувати</button>
        </span>
        <span id="status">—</span>
        <button id="refresh">Оновити</button>
        <button id="measure">Виміряти зараз</button>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="rtt"></canvas></div>
      <div class="box"><canvas id="loss"></canvas></div>
    </div>
    <div class="legend">
      <span class="leg"><span class="sq" style="background:rgba(239,68,68,0.4)"></span> LMT вимкнено</span>
      <span class="leg"><span class="sq" style="background:rgba(251,146,60,0.4)"></span> BITE вимкнено</span>
    </div>

    <header style="margin-top:28px">
      <h1>Лог роутера (netwatch flap-події)</h1>
      <div class="controls">
        <span id="router-status">—</span>
        <button id="refresh-router">Оновити лог</button>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="flaps"></canvas></div>
      <div class="box">
        <div class="netwatch-cards" id="netwatch-cards"></div>
        <table class="events" id="events-table">
          <thead>
            <tr><th>Час</th><th>Канал</th><th>Подія</th></tr>
          </thead>
          <tbody id="events-body"></tbody>
        </table>
      </div>
    </div>

    <header style="margin-top:28px">
      <h1>Агент</h1>
    </header>
    <div class="box agent-panel">
      <div class="agent-messages" id="agent-messages"></div>
      <div class="agent-approval" id="agent-approval" hidden>
        <span id="agent-approval-text"></span>
        <button id="agent-approve">Підтвердити</button>
        <button id="agent-reject">Відхилити</button>
      </div>
      <form class="agent-input" id="agent-form">
        <input type="text" id="agent-text" placeholder="Напр.: виміряй зараз / прочитай стан WAN" autocomplete="off" />
        <button type="submit" id="agent-send">Надіслати</button>
      </form>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
