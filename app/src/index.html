<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAN Monitor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/chart.umd.min.js"></script>
    <script src="vendor/chartjs-plugin-annotation.min.js"></script>
  </head>
  <body>
    <header>
      <h1>WAN якість: ZTE vs Soyea</h1>
      <div class="controls">
        <label for="period">Період:</label>
        <select id="period">
          <option value="1">1 год</option>
          <option value="3" selected>3 год</option>
          <option value="6">6 год</option>
          <option value="12">12 год</option>
          <option value="24">24 год</option>
          <option value="72">3 дні</option>
          <option value="168">7 днів</option>
          <option value="all">Весь час</option>
          <option value="custom">Свій період…</option>
        </select>
        <span id="custom-range" class="custom-range" hidden>
          <input type="datetime-local" id="range-from" />
          —
          <input type="datetime-local" id="range-to" />
          <button id="apply-range">Застосувати</button>
        </span>
        <span id="status">—</span>
        <button id="refresh">Оновити</button>
        <button id="measure">Виміряти зараз</button>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="rtt"></canvas></div>
      <div class="box"><canvas id="loss"></canvas></div>
    </div>
    <div class="legend">
      <span class="leg"><span class="sq" style="background:rgba(239,68,68,0.4)"></span> ZTE вимкнено</span>
      <span class="leg"><span class="sq" style="background:rgba(251,146,60,0.4)"></span> Soyea вимкнено</span>
    </div>

    <header style="margin-top:28px">
      <h1>Швидкість (живий графік)</h1>
      <div class="controls">
        <label for="speed-mode">Канали:</label>
        <select id="speed-mode">
          <option value="both" selected>Обидва</option>
          <option value="active">Тільки активні</option>
        </select>
        <span id="speed-status">—</span>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="speed"></canvas></div>
    </div>

    <header style="margin-top:28px">
      <h1>Лог роутера (netwatch flap-події)</h1>
      <div class="controls">
        <span id="router-status">—</span>
        <button id="refresh-router">Оновити лог</button>
      </div>
    </header>
    <div class="charts">
      <div class="box"><canvas id="flaps"></canvas></div>
      <div class="box">
        <div class="netwatch-cards" id="netwatch-cards"></div>
        <table class="events" id="events-table">
          <thead>
            <tr><th>Час</th><th>Канал</th><th>Подія</th></tr>
          </thead>
          <tbody id="events-body"></tbody>
        </table>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
